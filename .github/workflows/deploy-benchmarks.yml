name: Deploy benchmarks

on:
  push:
    branches: [main]
    paths:
      - "benchmark/**"
      - "src/**"
      - "scripts/build-benchmark.js"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - name: Build bundles
        run: node scripts/build-benchmark.js

      - name: Push to transformers-js.github.io
        env:
          PAGES_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${PAGES_DEPLOY_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          git clone --branch gh-pages git@github.com:transformers-js/transformers-js.github.io.git _site

          # Playground → site root
          mkdir -p _site/dist
          cp benchmark/playground.html _site/index.html
          cp benchmark/dist/playground.js _site/dist/playground.js

          # Benchmarks → /benchmarks/
          mkdir -p _site/benchmarks/dist
          cp benchmark/lfm2.html _site/benchmarks/lfm2.html
          cp benchmark/dist/lfm2.js _site/benchmarks/dist/lfm2.js
          cp benchmark/lfm2-vl.html _site/benchmarks/lfm2-vl.html
          cp benchmark/dist/lfm2-vl.js _site/benchmarks/dist/lfm2-vl.js

          cd _site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Deploy from transformers-js@${GITHUB_SHA::7}"
          git push
